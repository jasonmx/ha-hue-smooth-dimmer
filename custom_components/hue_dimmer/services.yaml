raise:
  name: Raise
  description: Start raising the brightness.
  target:
    entity:
      domain: light
      integration: hue
  fields:
    sweep_time:
      name: Sweep
      description: Duration of 0-100% sweep.
      example: 5
      required: false
      selector:
        number:
          min: 0.1
          step: any
          unit_of_measurement: s
          mode: box
    limit:
      name: Maximum brightness limit
      description: Stop transition at limit.
      example: 100
      required: false
      selector:
        number:
          min: 1
          max: 100
          step: 0.2
          unit_of_measurement: "%"

lower:
  name: Lower
  description: Start lowering the brightness.
  target:
    entity:
      domain: light
      integration: hue
  fields:
    sweep_time:
      name: Sweep
      description: Duration of 100-0% sweep.
      example: 5
      required: false
      selector:
        number:
          min: 0.1
          step: any
          unit_of_measurement: s
          mode: box
    limit:
      name: Minimum brightness limit
      description: Light turns off at 0%. Choose 0.4%+ to keep light on.
      example: 0.4
      required: false
      selector:
        number:
          min: 0
          max: 99
          step: 0.2
          unit_of_measurement: "%"

stop:
  name: Stop
  description: Stop a brightness transition.
  target:
    entity:
      domain: light
      integration: hue

set_attributes:
  name: Set attributes
  description: Set brightness, color temperature, and color without turning on.
  target:
    entity:
      domain: light
      integration: hue
  fields:
    brightness:
      name: Brightness
      description: Brightness level (%)
      example: 50
      required: false
      selector:
        number:
          min: 0.4
          max: 100
          step: 0.2
          unit_of_measurement: "%"
    min_brightness:
      name: Minimum brightness
      description: Enforce a minimum brightness (%)
      example: 20
      required: false
      selector:
        number:
          min: 0.4
          max: 100
          step: 0.2
          unit_of_measurement: "%"
    max_brightness:
      name: Maximum brightness
      description: Enforce a maximum brightness (%)
      example: 80
      required: false
      selector:
        number:
          min: 0.4
          max: 100
          step: 0.2
          unit_of_measurement: "%"
    color_temp_kelvin:
      name: Color temperature
      description: Color temperature (K)
      example: 2800
      required: false
      filter:
        attribute:
          supported_color_modes:
            - color_temp
            - hs
            - xy
            - rgb
            - rgbw
            - rgbww
      selector:
        number:
          min: 2200
          max: 6535
          step: 10
          unit_of_measurement: K
    xy_color:
      name: XY color
      description: CIE XY color as [x, y]
      example: "[0.52, 0.43]"
      required: false
      filter:
        attribute:
          supported_color_modes:
            - hs
            - xy
            - rgb
            - rgbw
            - rgbww
      selector:
        object:
    hs_color:
      name: Hue/Sat color
      description: Color as [hue, saturation] (0–360, 0–100)
      example: "[300, 70]"
      required: false
      filter:
        attribute:
          supported_color_modes:
            - hs
            - xy
            - rgb
            - rgbw
            - rgbww
      selector:
        object:
    rgb_color:
      name: RGB color
      description: Color as [r, g, b] (0–255 each)
      example: "[255, 100, 100]"
      required: false
      filter:
        attribute:
          supported_color_modes:
            - hs
            - xy
            - rgb
            - rgbw
            - rgbww
      selector:
        color_rgb:

get_attributes:
  name: Get attributes
  description: Get brightness, color temp, and color (XY, HS, RGB), even when lights are off.
  target:
    entity:
      domain: light
      integration: hue
